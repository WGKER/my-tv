name: Release MyTV APK

on:
  # 开启两种触发方式：手动触发 + 推送到 main/master 分支自动触发
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 代码迁出
        uses: actions/checkout@v4

      - name: 构建Java环境
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"
          cache: gradle # 加上缓存，加快构建速度

      - name: 给 gradlew 执行权限
        run: chmod +x ./gradlew

      - name: 构建未签名 Release APK
        run: ./gradlew assembleRelease -Pandroid.injected.signing.store.file=

      - name: 上传 APK 到 Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: MyTV-APK
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30 # 保留 30 天，方便下载
